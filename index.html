<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hazem Ahmed</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="lights-control">
        Lights
        <input type="checkbox" id="lights-toggle" />
        <label for="lights-toggle" class="switch"></label>
      </div>
      <article class="card">
        <div class="lights">
          <img class="light" src="Group 11.svg" alt="light icon" />
        </div>
        <div class="top"></div>
        <div class="middle">
          <img class="pic" src="image2.jpeg" alt="Hazem Ahmed" />
          <h1 class="title">Hazem Ahmed</h1>
          <h2 class="profession">Software Engineer</h2>
        </div>
        <div class="bottom">
          <div class="column">
            <div class="iconc">
              <a
                href="https://linkedin.com/in/hazem_ahmed"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img class="icon" src="linkedin.png" alt="linkedin icon" />
              </a>
              <a
                href="https://youtube.com/hazem_ahmed"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img class="icon" src="youtube.png" alt="youtube icon" />
              </a>
            </div>
            <h3 class="username">hazem_ahmed</h3>
          </div>
          <div class="column">
            <div class="iconc">
              <a
                href="https://twitter.com/hazem_ahmed"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img class="icon" src="twitter.png" alt="twitter icon" />
              </a>
              <a
                href="https://instagram.com/hazem_ahmed"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img class="icon" src="instagram.png" alt="instagram icon" />
              </a>
            </div>
            <h3 class="username">hazem_ahmed</h3>
          </div>
          <div class="column">
            <div class="iconc">
              <a
                href="https://facebook.com/hazem_ahmed"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img class="icon" src="facebook.png" alt="facebook icon" />
              </a>
            </div>
            <h3 class="username">hazem_ahmed</h3>
          </div>
        </div>
      </article>
    </div>
  </body>
</html>
